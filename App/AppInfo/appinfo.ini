[Format]
Type=PortableAppsFormat
Version=3.9

[Details]
Name=Brave Nightly Portable
AppId=BraveNightlyPortable-AlexRabbit
Publisher=Brave Software (unofficial portable wrapper)
Homepage=https://github.com/AlexRabbit/Brave-Portable
Category=Internet
Description=Privacy-focused Chromium web browser (Nightly channel)
Language=English
InstallType=nightly

[License]
Shareable=true
OpenSource=true
Freeware=true
CommercialUse=true

[Dependencies]
UsesJava=no
Requires64bitOS=yes
RequiresAdmin=no

[Version]
PackageVersion=0.0.0.0
DisplayVersion=Download on first run

[Control]
Icons=1
Start=START-BRAVE-NIGHTLY.bat
ExtractIcon=App\Brave\brave.exe
BaseAppID=%BASELAUNCHERPATH%\App\Brave\brave.exe
ExitEXE=App\Brave\brave
ExitParameters=-exit

[Associations]
FileTypes=html,htm,shtml,xht,xhtml
Protocols=http,https

[SpecialPaths]
Plugins=NONE
