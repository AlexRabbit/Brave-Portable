name: Release Brave Nightly Portable

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "Data/**"
      - "App/Brave/**"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve latest official Brave Nightly
        id: brave
        shell: pwsh
        run: |
          $headers = @{
            "User-Agent" = "BraveNightlyPortable-CI"
            "Accept" = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/brave/brave-browser/releases?per_page=100" -Headers $headers
          $asset = $null
          $version = $null
          foreach ($rel in ($releases | Where-Object { $_.name -match "Nightly" })) {
            $candidate = $rel.assets | Where-Object { $_.name -match "^brave-v[\d\.]+-win32-x64\.zip$" } | Select-Object -First 1
            if ($candidate) {
              $asset = $candidate
              $version = $rel.tag_name.TrimStart("v")
              break
            }
          }
          if (-not $asset) { throw "No Nightly release with brave-v*-win32-x64.zip found" }
          "version=$version" >> $env:GITHUB_OUTPUT
          "asset_url=$($asset.browser_download_url)" >> $env:GITHUB_OUTPUT

      - name: Download official Brave Nightly into App/Brave
        shell: pwsh
        run: |
          $dest = "App/Brave"
          Remove-Item $dest -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          Invoke-WebRequest -Uri "${{ steps.brave.outputs.asset_url }}" -OutFile brave.zip -Headers @{ "User-Agent" = "BraveNightlyPortable-CI" }
          Expand-Archive brave.zip -DestinationPath $dest -Force
          if (-not (Test-Path "$dest/brave.exe")) {
            $sub = Get-ChildItem $dest -Directory | Where-Object { Test-Path "$($_.FullName)/brave.exe" } | Select-Object -First 1
            if ($sub) { Get-ChildItem $sub.FullName | Move-Item -Destination $dest -Force; Remove-Item $sub.FullName -Force }
          }
          $info = (Get-Item "$dest/brave.exe").VersionInfo
          if ($info.ProductName -notmatch "Nightly") { throw "Not Nightly: $($info.ProductName)" }

      - name: Bump appinfo.ini
        shell: pwsh
        run: |
          $v = "${{ steps.brave.outputs.version }}"
          $p = $v.Split(".")
          $pkg = "$($p[0]).$($p[1]).$($p[2]).0"
          (Get-Content App/AppInfo/appinfo.ini) -replace '^PackageVersion=.*', "PackageVersion=$pkg" -replace '^DisplayVersion=.*', "DisplayVersion=$v Nightly" | Set-Content App/AppInfo/appinfo.ini -Encoding ASCII

      - name: Build launcher exe (~1 MB)
        run: dotnet publish wrapper/BraveNightlyPortable-AlexRabbit.csproj -c Release -r win-x64 --self-contained false -o wrapper/out

      - name: Stage ready-to-use Release zip
        shell: pwsh
        run: |
          Copy-Item wrapper/out/BraveNightlyPortable-AlexRabbit.exe . -Force
          if (-not (Test-Path BraveNightlyPortable-Internal.exe)) {
            throw "Missing BraveNightlyPortable-Internal.exe at package root"
          }

          $version = "${{ steps.brave.outputs.version }}"
          $stageRoot = "release-stage"
          $folderName = "BraveNightlyPortable"
          $stage = Join-Path $stageRoot $folderName
          Remove-Item $stageRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $stage -Force | Out-Null

          # Ready folder for end users — extract zip and double-click the AlexRabbit exe
          $copy = @(
            "BraveNightlyPortable-AlexRabbit.exe",
            "BraveNightlyPortable-Internal.exe",
            "README.md",
            "LICENSE",
            "App",
            "Other",
            "docs"
          )
          foreach ($item in $copy) {
            if (-not (Test-Path $item)) { throw "Missing package item: $item" }
            Copy-Item $item $stage -Recurse -Force
          }

          $zipName = "BraveNightlyPortable_${version}_win64.zip"
          if (Test-Path $zipName) { Remove-Item $zipName -Force }
          Compress-Archive -Path $stage -DestinationPath $zipName -Force
          Write-Host "Created $zipName (ready folder: $folderName/)"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-v${{ steps.brave.outputs.version }}
          name: Brave Nightly Portable v${{ steps.brave.outputs.version }}
          body: |
            ## Brave Nightly Portable — by AlexRabbit

            Ready-to-use folder. Download the zip → extract → double-click:

            **`BraveNightlyPortable-AlexRabbit.exe`**

            ### Set as your default browser
            Run once:
            ```
            BraveNightlyPortable-AlexRabbit.exe --register-default
            ```
            Then in Windows Settings → Default apps, choose **Brave Nightly Portable (AlexRabbit)**.
            Do **not** use “Set as default” inside Brave Settings (that opens a second non-portable Brave).

            - Official Nightly from [brave/brave-browser](https://github.com/brave/brave-browser/releases)
            - Profile: `Data/profile/` (copy the whole folder to move PCs)
            - Requires [.NET 8 Desktop Runtime](https://dotnet.microsoft.com/download/dotnet/8.0) (usually preinstalled on Win11)

            Maintained by [AlexRabbit](https://github.com/AlexRabbit).
          files: BraveNightlyPortable_${{ steps.brave.outputs.version }}_win64.zip
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
