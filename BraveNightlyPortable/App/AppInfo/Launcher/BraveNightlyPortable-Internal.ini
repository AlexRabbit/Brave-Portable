; PortableApps.com Launcher config for Brave Nightly
; Must match launcher exe name: BraveNightlyPortable-AlexRabbit.exe

[Launch]
ProgramExecutable=Brave\brave.exe
CommandLineArguments=--user-data-dir="%PAL:DataDir%\profile" --disk-cache-dir="%PAL:DataDir%\cache" --disable-brave-update --no-default-browser-check --disable-breakpad --no-first-run --disable-logging --disable-features=MediaRouter
DirectoryMoveOK=yes
SupportsUNC=yes
SingleAppInstance=false
WaitForProgram=true
CleanTemp=true
SplashTime=2500

[Activate]
Registry=true
XML=false

[RegistryKeys]
BraveSoftware=HKCU\Software\BraveSoftware
Brave=HKCU\Software\Brave

[RegistryCleanupIfEmpty]
1=HKCU\Software\BraveSoftware
2=HKCU\Software\Brave

[Environment]
BravePortableProfile=%PAL:DataDir%\profile
BravePortableCache=%PAL:DataDir%\cache
